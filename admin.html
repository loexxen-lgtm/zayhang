<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAYHANG — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:    #C89B3C;
    --gold2:   #F0E6D3;
    --gold3:   #785A28;
    --gold-dim: rgba(200,155,60,0.12);
    --blue:    #0BC4E3;
    --green:   #3ecf72;
    --red:     #f05353;
    --orange:  #f08040;
    --bg:      #080e17;
    --surface: #0d1520;
    --surface2:#111c2a;
    --border:  rgba(255,255,255,0.06);
    --border-gold: rgba(200,155,60,0.25);
    --text:    #8a9baf;
    --text2:   #c8d8e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  /* Subtle background glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(200,155,60,0.05) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 28px 60px; }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border-gold);
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand { display: flex; flex-direction: column; gap: 5px; }

  .brand-name {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.14em;
    line-height: 1;
  }

  .brand-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--blue);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--gold-dim);
    border: 1px solid var(--border-gold);
    color: var(--gold);
  }

  .header-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .btn-group { display: flex; gap: 8px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid;
  }

  .btn-primary {
    background: var(--gold);
    border-color: var(--gold);
    color: #0d0900;
  }
  .btn-primary:hover { background: #d4aa52; border-color: #d4aa52; }

  .btn-ghost {
    background: transparent;
    border-color: var(--border-gold);
    color: var(--gold);
  }
  .btn-ghost:hover { background: var(--gold-dim); }

  .sync-label {
    font-size: 11px;
    color: var(--text);
  }
  .sync-ok   { color: var(--green); }
  .sync-err  { color: var(--red);   }
  .sync-ing  { color: var(--text);  }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold3);
    border-radius: 6px;
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a5570;
    margin-bottom: 6px;
  }

  .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat.v-blue  .stat-val { color: var(--blue);  }
  .stat.v-green .stat-val { color: var(--green); }
  .stat.v-red   .stat-val { color: var(--red);   }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .inp, .sel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text2);
    outline: none;
    transition: border-color 0.15s;
  }
  .inp { flex: 1; min-width: 180px; }
  .inp::placeholder { color: #2a4055; }
  .inp:focus, .sel:focus { border-color: var(--gold3); }
  .sel option { background: #0d1520; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .table-wrap table {
    width: 100%;
    border-collapse: collapse;
  }

  thead { background: var(--surface2); }

  th {
    padding: 10px 14px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold3);
    border-bottom: 1px solid var(--border);
    text-align: left;
    white-space: nowrap;
  }

  td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(200,155,60,0.025); }

  .n { color: #253545; font-size: 11px; }

  .uname { color: var(--text2); font-weight: 500; }

  .lvl-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 2px 9px;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    min-width: 44px;
    border: 1px solid;
  }
  .lvl-low  { background: rgba(11,196,227,0.07);  color: var(--blue);  border-color: rgba(11,196,227,0.18); }
  .lvl-mid  { background: rgba(62,207,114,0.07);  color: var(--green); border-color: rgba(62,207,114,0.18); }
  .lvl-high { background: rgba(200,155,60,0.08);  color: var(--gold);  border-color: rgba(200,155,60,0.22); }
  .lvl-max  { background: rgba(240,83,83,0.07);   color: var(--red);   border-color: rgba(240,83,83,0.18); }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: 1px solid;
    white-space: nowrap;
  }
  .pill-botting { background: rgba(62,207,114,0.06);  color: var(--green); border-color: rgba(62,207,114,0.18); }
  .pill-idle    { background: rgba(138,155,175,0.05);  color: #3a5570;      border-color: var(--border); }
  .pill-banned  { background: rgba(240,83,83,0.06);    color: var(--red);   border-color: rgba(240,83,83,0.18); }
  .pill-ready   { background: rgba(11,196,227,0.06);   color: var(--blue);  border-color: rgba(11,196,227,0.18); }

  .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .d-green { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .d-blue  { background: var(--blue);  box-shadow: 0 0 4px var(--blue);  }
  .d-red   { background: var(--red);   }
  .d-dim   { background: #253545;      }

  .pc-tag {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 11px;
    color: #4a6a8a;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    padding: 1px 7px;
    border-radius: 3px;
  }

  .rg { color: #3a5570; font-size: 12px; font-weight: 600; }

  .ban-t { font-family: 'Consolas', monospace; font-size: 11px; }
  .bt-active  { color: var(--orange); }
  .bt-expired { color: #253545; }
  .bt-none    { color: #1a2d3d; font-size: 10px; }

  .notes { font-size: 11px; color: #2a4055; font-style: italic; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .rdy-btn {
    padding: 4px 11px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid;
  }
  .rdy-on  { background: rgba(11,196,227,0.07);  color: var(--blue);  border-color: rgba(11,196,227,0.25); }
  .rdy-on:hover  { background: rgba(11,196,227,0.15); }
  .rdy-off { background: transparent; color: #2a4055; border-color: var(--border); }
  .rdy-off:hover { border-color: var(--gold3); color: var(--text); }

  .act-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 9px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #3a5570;
    cursor: pointer;
    margin-right: 4px;
    transition: all 0.12s;
  }
  .act-btn:hover { border-color: var(--gold3); color: var(--gold); }
  .del-btn { border-color: rgba(240,83,83,0.15); color: rgba(240,83,83,0.45); }
  .del-btn:hover { border-color: var(--red); color: var(--red); background: rgba(240,83,83,0.04); }

  .empty-row { text-align: center; padding: 60px 20px; color: #1f3248; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.1em; }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-gold);
    border-radius: 8px;
    padding: 28px;
    width: 400px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 0;
  }

  .modal h2 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 20px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    color: #3a5570;
    margin-bottom: 5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field input, .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--text2);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--gold3); }
  .field select option { background: #0d1520; }

  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .ban-section {
    background: rgba(240,83,83,0.04);
    border: 1px solid rgba(240,83,83,0.15);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .ban-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(240,83,83,0.55);
    margin-bottom: 10px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 22px;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
    cursor: pointer;
  }
  .btn-cancel:hover { border-color: var(--gold3); }

  .btn-save {
    background: var(--gold);
    border: none;
    border-radius: 4px;
    padding: 8px 22px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #0d0900;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #d4aa52; }

  .err-msg { color: var(--red); font-size: 11px; margin-top: 4px; display: none; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: #1a2d3d;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="brand">
      <div class="brand-name"><img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/logo.png" style="height:32px;vertical-align:middle;margin-right:8px;" onerror="this.style.display='none'">League of Legends</div>
      <div class="brand-meta">
        <span class="brand-sub">League Account Tracker</span>
        <span class="badge">👑 Admin</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="openModal()">+ Add Account</button>
        <button class="btn btn-ghost" onclick="pushToCloud()">↑ Sync</button>
      </div>
      <div class="sync-label" id="sync-status"></div>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat v-green"><div class="stat-label">Botting</div><div class="stat-val" id="s-botting">0</div></div>
    <div class="stat v-blue"><div class="stat-label">Ready</div><div class="stat-val" id="s-ready">0</div></div>
    <div class="stat v-red"><div class="stat-label">Banned</div><div class="stat-val" id="s-banned">0</div></div>
    <div class="stat"><div class="stat-label">Avg Level</div><div class="stat-val" id="s-avg">—</div></div>
  </div>

  <div class="filters">
    <input type="text" class="inp" id="search" placeholder="Search username or PC…" oninput="render()">
    <select class="sel" id="filter-status" onchange="render()">
      <option value="">All Statuses</option>
      <option value="botting">Botting</option>
      <option value="ready">Ready</option>
      <option value="idle">Idle</option>
      <option value="banned">Banned</option>
    </select>
    <select class="sel" id="filter-region" onchange="render()">
      <option value="">All Regions</option>
      <option>EUW</option><option>EUNE</option><option>NA</option><option>KR</option>
      <option>LAN</option><option>LAS</option><option>OCE</option><option>TR</option><option>RU</option><option>BR</option>
    </select>
    <select class="sel" id="sort-by" onchange="render()">
      <option value="date">Added ↓</option>
      <option value="lvl-desc">Level ↓</option>
      <option value="lvl-asc">Level ↑</option>
      <option value="user">Name</option>
      <option value="pc">PC</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Username</th><th>Level</th><th>Status</th><th>Ready</th>
          <th>PC</th><th>Region</th><th>Ban Timer</th><th>Notes</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="acc-table"></tbody>
    </table>
  </div>

  <footer class="footer">Changes auto-sync to resellers on every action</footer>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Add Account</h2>
    <div class="field">
      <label>Username *</label>
      <input type="text" id="f-user" placeholder="SummonerName">
      <div class="err-msg" id="err-user">Username is required</div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Level</label>
        <input type="number" id="f-lvl" min="1" max="500" value="1">
      </div>
      <div class="field">
        <label>Region</label>
        <select id="f-region">
          <option>EUW</option><option>EUNE</option><option>NA</option><option>KR</option>
          <option>LAN</option><option>LAS</option><option>OCE</option><option>TR</option><option>RU</option><option>BR</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>PC / Machine</label>
      <input type="text" id="f-pc" placeholder="e.g. PC1">
    </div>
    <div class="field">
      <label>Status</label>
      <select id="f-status" onchange="toggleBanFields()">
        <option value="botting">Botting</option>
        <option value="ready">Ready for Sale</option>
        <option value="idle">Idle</option>
        <option value="banned">Banned</option>
      </select>
    </div>
    <div class="ban-section" id="ban-section" style="display:none;">
      <div class="ban-title">Ban Details</div>
      <div class="field"><label>Ban End Date &amp; Time</label><input type="datetime-local" id="f-ban-end"></div>
      <div class="field"><label>Ban Reason (optional)</label><input type="text" id="f-ban-reason" placeholder="e.g. botting detected…"></div>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="f-notes" placeholder="e.g. main farm acc…">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveAccount()">Save</button>
    </div>
  </div>
</div>

<script>
  const API_KEY='$2a$10$8t/llLFgyYG0T8rgpubgO.4RHcSNhVvFjBkoug.tIRIxs3/mD7xwq';
  const LOCAL_KEY='lol_admin_v1',BIN_KEY='lol_bin_id';
  let accounts=[],editIdx=-1,binId=localStorage.getItem(BIN_KEY)||'';
  try{accounts=JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]');}catch(e){}

  function save(){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(accounts));}catch(e){}}
  function lvlClass(l){return l<30?'lvl-low':l<100?'lvl-mid':l<200?'lvl-high':'lvl-max';}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function banTimerHtml(a){
    if(a.status!=='banned')return'<span class="ban-t bt-none">—</span>';
    if(!a.banEnd)return'<span class="ban-t bt-active">Permanent</span>';
    const diff=new Date(a.banEnd)-new Date();
    if(diff<=0)return'<span class="ban-t bt-expired">Expired</span>';
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
    let s='';if(d>0)s+=d+'d ';if(h>0)s+=h+'h ';s+=m+'m';
    return`<span class="ban-t bt-active">${s}</span>`;
  }

  function toggleReady(i){
    accounts[i].ready=!accounts[i].ready;
    accounts[i].status=accounts[i].ready?'ready':'idle';
    save();render();pushToCloud();
  }

  function render(){
    const q=document.getElementById('search').value.toLowerCase();
    const fS=document.getElementById('filter-status').value;
    const fR=document.getElementById('filter-region').value;
    const sB=document.getElementById('sort-by').value;
    let list=accounts.map((a,i)=>({...a,_i:i})).filter(a=>{
      if(q&&!a.user.toLowerCase().includes(q)&&!(a.pc||'').toLowerCase().includes(q))return false;
      if(fS&&a.status!==fS)return false;
      if(fR&&a.region!==fR)return false;
      return true;
    });
    if(sB==='lvl-desc')list.sort((a,b)=>b.lvl-a.lvl);
    else if(sB==='lvl-asc')list.sort((a,b)=>a.lvl-b.lvl);
    else if(sB==='user')list.sort((a,b)=>a.user.localeCompare(b.user));
    else if(sB==='pc')list.sort((a,b)=>(a.pc||'').localeCompare(b.pc||''));
    const tb=document.getElementById('acc-table');
    if(!list.length){
      tb.innerHTML=`<tr><td colspan="10" class="empty-row">${accounts.length===0?'No accounts yet — add your first one':'No accounts match filters'}</td></tr>`;
    }else{
      tb.innerHTML=list.map((a,n)=>{
        const sc=a.status==='botting'?'pill-botting':a.status==='banned'?'pill-banned':a.status==='ready'?'pill-ready':'pill-idle';
        const dc=a.status==='botting'?'d-green':a.status==='banned'?'d-red':a.status==='ready'?'d-blue':'d-dim';
        const sl=a.status==='botting'?'Botting':a.status==='banned'?'Banned':a.status==='ready'?'Ready':'Idle';
        const isR=a.status==='ready';
        return`<tr>
          <td><span class="n">${n+1}</span></td>
          <td><span class="uname">${esc(a.user)}</span></td>
          <td><span class="lvl-badge ${lvlClass(a.lvl)}">${a.lvl}</span></td>
          <td><span class="pill ${sc}"><span class="dot ${dc}"></span>${sl}</span></td>
          <td><button class="rdy-btn ${isR?'rdy-on':'rdy-off'}" onclick="toggleReady(${a._i})">${isR?'✓ Ready':'Set Ready'}</button></td>
          <td>${a.pc?`<span class="pc-tag">${esc(a.pc)}</span>`:'<span style="color:#1a2d3d">—</span>'}</td>
          <td><span class="rg">${a.region}</span></td>
          <td>${banTimerHtml(a)}</td>
          <td><div class="notes" title="${esc(a.notes||'')}">${esc(a.notes||'—')}</div></td>
          <td><button class="act-btn" onclick="openModal(${a._i})">Edit</button><button class="act-btn del-btn" onclick="del(${a._i})">Del</button></td>
        </tr>`;
      }).join('');
    }
    const tot=accounts.length,bot=accounts.filter(a=>a.status==='botting').length,
          rdy=accounts.filter(a=>a.status==='ready').length,ban=accounts.filter(a=>a.status==='banned').length,
          avg=tot?Math.round(accounts.reduce((s,a)=>s+a.lvl,0)/tot):null;
    document.getElementById('s-total').textContent=tot;
    document.getElementById('s-botting').textContent=bot;
    document.getElementById('s-ready').textContent=rdy;
    document.getElementById('s-banned').textContent=ban;
    document.getElementById('s-avg').textContent=avg??'—';
  }

  function toggleBanFields(){document.getElementById('ban-section').style.display=document.getElementById('f-status').value==='banned'?'block':'none';}

  function openModal(idx){
    editIdx=idx!==undefined?idx:-1;
    document.getElementById('modal-title').textContent=editIdx>=0?'Edit Account':'Add Account';
    const a=editIdx>=0?accounts[editIdx]:{};
    document.getElementById('f-user').value=a.user||'';
    document.getElementById('f-lvl').value=a.lvl||1;
    document.getElementById('f-pc').value=a.pc||'';
    document.getElementById('f-region').value=a.region||'EUW';
    document.getElementById('f-status').value=a.status||'botting';
    document.getElementById('f-ban-end').value=a.banEnd||'';
    document.getElementById('f-ban-reason').value=a.banReason||'';
    document.getElementById('f-notes').value=a.notes||'';
    document.getElementById('err-user').style.display='none';
    toggleBanFields();
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-user').focus();
  }

  function closeModal(){document.getElementById('overlay').classList.remove('open');}
  function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

  function saveAccount(){
    const user=document.getElementById('f-user').value.trim();
    if(!user){document.getElementById('err-user').style.display='block';document.getElementById('f-user').focus();return;}
    const status=document.getElementById('f-status').value;
    const acc={user,lvl:Math.max(1,Math.min(500,parseInt(document.getElementById('f-lvl').value)||1)),
      pc:document.getElementById('f-pc').value.trim(),region:document.getElementById('f-region').value,
      status,ready:status==='ready',
      banEnd:status==='banned'?document.getElementById('f-ban-end').value:'',
      banReason:status==='banned'?document.getElementById('f-ban-reason').value.trim():'',
      notes:document.getElementById('f-notes').value.trim(),
      added:editIdx>=0?(accounts[editIdx].added||Date.now()):Date.now()};
    if(editIdx>=0)accounts[editIdx]=acc;else accounts.push(acc);
    save();closeModal();render();pushToCloud();
  }

  function del(i){
    if(!confirm(`Delete "${accounts[i].user}"?`))return;
    accounts.splice(i,1);save();render();pushToCloud();
  }

  async function pushToCloud(){
    const el=document.getElementById('sync-status');
    el.className='sync-label sync-ing';el.textContent='Syncing…';
    const payload={accounts:accounts.map(a=>({user:a.user,lvl:a.lvl,region:a.region,status:a.status,ready:a.status==='ready',banEnd:a.banEnd||'',notes:a.notes||'',updatedAt:new Date().toISOString()})),updatedAt:new Date().toISOString()};
    try{
      if(!binId){
        const res=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Name':'zayhang-lol','X-Bin-Private':'false'},body:JSON.stringify(payload)});
        const data=await res.json();binId=data.metadata.id;localStorage.setItem(BIN_KEY,binId);
      }else{
        await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(payload)});
      }
      el.className='sync-label sync-ok';el.textContent='✓ Synced — '+new Date().toLocaleTimeString();
    }catch(e){el.className='sync-label sync-err';el.textContent='✗ Failed: '+e.message;}
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open'))saveAccount();
    if(e.key==='Escape')closeModal();
  });
  render();setInterval(render,60000);
</script>
</body>
</html>
