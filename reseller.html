<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAYHANG — Account Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:    #C89B3C;
    --gold2:   #F0E6D3;
    --gold3:   #785A28;
    --gold-dim: rgba(200,155,60,0.10);
    --blue:    #0BC4E3;
    --bg:      #080e17;
    --surface: #0d1520;
    --surface2:#111c2a;
    --border:  rgba(255,255,255,0.06);
    --border-gold: rgba(200,155,60,0.22);
    --text:    #8a9baf;
    --text2:   #c8d8e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(11,196,227,0.05) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 28px 60px; }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border-gold);
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand { display: flex; flex-direction: column; gap: 5px; }

  .brand-name {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.14em;
    line-height: 1;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--blue);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .contact-row { display: flex; gap: 8px; }

  .contact-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.15s;
    border: 1px solid;
    letter-spacing: 0.02em;
  }

  .btn-discord {
    background: rgba(88,101,242,0.08);
    border-color: rgba(88,101,242,0.25);
    color: #7289da;
  }
  .btn-discord:hover { background: rgba(88,101,242,0.16); border-color: #7289da; color: #fff; }

  .btn-telegram {
    background: rgba(11,196,227,0.07);
    border-color: rgba(11,196,227,0.22);
    color: var(--blue);
  }
  .btn-telegram:hover { background: rgba(11,196,227,0.14); border-color: var(--blue); color: #fff; }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold3);
    border-radius: 6px;
    padding: 14px 18px;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a5570;
    margin-bottom: 6px;
  }

  .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat.v-blue .stat-val { color: var(--blue); }
  .stat-val-sm { font-size: 15px; color: var(--text); margin-top: 4px; font-family: 'Inter', sans-serif; font-weight: 500; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .sel, .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text2);
    outline: none;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .sel:focus { border-color: var(--gold3); }
  .sel option { background: #0d1520; }

  .refresh-btn {
    color: var(--gold);
    border-color: var(--border-gold);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .refresh-btn:hover { background: var(--gold-dim); }

  /* ── ERROR ── */
  .error-box {
    background: rgba(50,10,10,0.7);
    border: 1px solid rgba(200,50,50,0.25);
    border-radius: 4px;
    padding: 10px 16px;
    color: #ff6b6b;
    font-size: 12px;
    margin-bottom: 14px;
    display: none;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead { background: var(--surface2); }

  th {
    padding: 12px 16px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold3);
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-size: 13px;
  }

  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(200,155,60,0.02); }

  .n { color: #253545; font-size: 11px; }

  .lvl-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 2px 10px;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    min-width: 48px;
    border: 1px solid;
  }
  .lvl-low  { background: rgba(11,196,227,0.07);  color: var(--blue);  border-color: rgba(11,196,227,0.18); }
  .lvl-mid  { background: rgba(62,207,114,0.07);  color: #3ecf72;      border-color: rgba(62,207,114,0.18); }
  .lvl-high { background: rgba(200,155,60,0.08);  color: var(--gold);  border-color: rgba(200,155,60,0.22); }
  .lvl-max  { background: rgba(240,83,83,0.07);   color: #f05353;      border-color: rgba(240,83,83,0.18); }

  .region-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #3a5570;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    padding: 2px 9px;
    border-radius: 3px;
  }

  .ready-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(11,196,227,0.07);
    border: 1px solid rgba(11,196,227,0.2);
    color: var(--blue);
    border-radius: 3px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .dot-ready {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 5px var(--blue);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .notes-cell { color: #2a4055; font-size: 11px; font-style: italic; }

  .loading-state { text-align: center; padding: 70px 20px; color: #1f3248; font-family: 'Cinzel', serif; letter-spacing: 0.1em; font-size: 13px; }

  .empty-state { text-align: center; padding: 70px 20px; color: #1f3248; }
  .empty-state .icon { font-size: 40px; margin-bottom: 14px; opacity: 0.3; }
  .empty-state p { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.1em; }
  .empty-state small { font-size: 11px; color: #162535; margin-top: 8px; display: block; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .footer-brand {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold3);
    letter-spacing: 0.1em;
  }

  .footer-updated { font-size: 11px; color: #1f3248; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="brand">
      <div class="brand-name">ZAYHANG</div>
      <div class="brand-sub">⚔ &nbsp; League Account Store</div>
    </div>
    <div class="contact-row">
      <a class="contact-btn btn-discord" href="https://discord.com/users/zayhang_" target="_blank">
        💬 zayhang_
      </a>
      <a class="contact-btn btn-telegram" href="https://t.me/novastorelol" target="_blank">
        ✈ novastorelol
      </a>
    </div>
  </header>

  <div class="stats">
    <div class="stat v-blue">
      <div class="stat-label">Available Now</div>
      <div class="stat-val" id="s-ready">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Last Updated</div>
      <div class="stat-val-sm" id="s-updated">—</div>
    </div>
  </div>

  <div class="filters">
    <select class="sel" id="filter-region" onchange="renderData()">
      <option value="">All Regions</option>
      <option>EUW</option><option>EUNE</option><option>NA</option><option>KR</option>
      <option>LAN</option><option>LAS</option><option>OCE</option><option>TR</option>
      <option>RU</option><option>BR</option>
    </select>
    <select class="sel" id="sort-by" onchange="renderData()">
      <option value="lvl-desc">Level: High → Low</option>
      <option value="lvl-asc">Level: Low → High</option>
    </select>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Level</th>
          <th>Region</th>
          <th>Status</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="data-table">
        <tr><td colspan="5" class="loading-state">Loading accounts…</td></tr>
      </tbody>
    </table>
  </div>

  <footer class="footer">
    <div class="footer-brand">ZAYHANG © 2025</div>
    <div class="footer-updated" id="last-updated"></div>
  </footer>

</div>

<script>
  const API_KEY = '$2a$10$8t/llLFgyYG0T8rgpubgO.4RHcSNhVvFjBkoug.tIRIxs3/mD7xwq';
  let allReady = [];
  let binId = '69d47c73856a68218907b9a2';

  loadData();

  async function loadData() {
    document.getElementById('data-table').innerHTML = '<tr><td colspan="5" class="loading-state">Loading accounts…</td></tr>';
    showError('');
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
        headers: { 'X-Access-Key': API_KEY }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const accounts = data.record?.accounts;
      allReady = (accounts || []).filter(a => a.ready === true || a.status === 'ready');
      const updated = data.record?.updatedAt ? new Date(data.record.updatedAt).toLocaleString() : '—';
      document.getElementById('last-updated').textContent = 'Updated: ' + updated;
      document.getElementById('s-updated').textContent = updated;
      renderData();
    } catch(e) {
      showError('Could not load accounts: ' + e.message);
      document.getElementById('data-table').innerHTML = '<tr><td colspan="5" class="loading-state">Failed to load.</td></tr>';
    }
  }

  function renderData() {
    const fReg   = document.getElementById('filter-region').value;
    const sortBy = document.getElementById('sort-by').value;

    let list = allReady.filter(a => {
      if (fReg && a.region !== fReg) return false;
      return true;
    });

    if (sortBy === 'lvl-desc') list.sort((a, b) => b.lvl - a.lvl);
    else list.sort((a, b) => a.lvl - b.lvl);

    document.getElementById('s-ready').textContent = allReady.length;

    const tbody = document.getElementById('data-table');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="5">
        <div class="empty-state">
          <div class="icon">⚔</div>
          <p>${allReady.length === 0 ? 'No accounts available right now' : 'No accounts match filters'}</p>
          <small>${allReady.length === 0 ? 'Check back later or contact zayhang' : 'Try removing filters'}</small>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = list.map((a, n) => {
      const lvlC = a.lvl < 30 ? 'lvl-low' : a.lvl < 100 ? 'lvl-mid' : a.lvl < 200 ? 'lvl-high' : 'lvl-max';
      return `<tr>
        <td><span class="n">${n + 1}</span></td>
        <td><span class="lvl-badge ${lvlC}">${a.lvl}</span></td>
        <td><span class="region-tag">${esc(a.region)}</span></td>
        <td><span class="ready-pill"><span class="dot-ready"></span>Ready</span></td>
        <td><span class="notes-cell">${esc(a.notes || '—')}</span></td>
      </tr>`;
    }).join('');
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.style.display = msg ? 'block' : 'none';
    el.textContent = msg;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  setInterval(loadData, 120000);
</script>
</body>
</html>
